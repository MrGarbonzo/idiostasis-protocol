services:
  agent:
    # Use the per-commit SHA tag from GitHub Actions (e.g. :sha-abc1234).
    image: ghcr.io/mrgarbonzo/idiostasis-protocol/agent:REPLACE_WITH_TAG
    container_name: idiostasis-agent
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - AGENT_ROLE=${AGENT_ROLE:-primary}
      - BASE_RPC_URL=${BASE_RPC_URL:-}
      - BASE_NETWORK=${BASE_NETWORK:-base-sepolia}
      - ERC8004_REGISTRY_ADDRESS=${ERC8004_REGISTRY_ADDRESS:-0x8004A818BFB912233c491871b3d84c89A494BD9e}
      - EVM_MNEMONIC=${EVM_MNEMONIC:-}
      - AGENT_IMAGE_URL=${AGENT_IMAGE_URL:-}
      - SECRETVM_DOMAIN=${SECRETVM_DOMAIN:-}
      - SECRETVM_API_KEY=${SECRETVM_API_KEY:-}
