services:
  agent:
    # Use the per-commit SHA tag from GitHub Actions (e.g. :sha-abc1234).
    image: ghcr.io/mrgarbonzo/idiostasis-protocol/agent:REPLACE_WITH_TAG
    container_name: idiostasis-agent
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - AGENT_ROLE=${AGENT_ROLE:-primary}
