services:
  agent:
    # Pin by digest — tags are forbidden because RTMR3 measures compose content.
    # Copy the digest from the GitHub Actions "Print digest" step after each build.
    image: ghcr.io/mrgarbonzo/idiostasis-protocol/agent@REPLACE_WITH_DIGEST_FROM_GITHUB_ACTIONS
    container_name: idiostasis-agent
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - AGENT_ROLE=${AGENT_ROLE:-primary}
