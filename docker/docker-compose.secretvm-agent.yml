services:
  agent:
    # Use the per-commit SHA tag from GitHub Actions (e.g. :sha-abc1234).
    image: ghcr.io/mrgarbonzo/idiostasis-protocol/agent:sha-f347533
    container_name: idiostasis-agent
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - agent_data:/data
    environment:
      - NODE_ENV=production
      - DEV_MODE=false
      - BASE_NETWORK=base-sepolia
      - BASE_RPC_URL=https://sepolia.base.org
      - ERC8004_REGISTRY_ADDRESS=0x8004A818BFB912233c491871b3d84c89A494BD9e
      - ERC8004_TOKEN_ID=2196
    env_file:
      - usr/.env

volumes:
  agent_data:
    driver: local
