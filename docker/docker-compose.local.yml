services:
  agent:
    build:
      context: ..
      dockerfile: docker/agent.dockerfile
    container_name: idiostasis-agent
    ports:
      - "3001:3001"
    environment:
      - DEV_MODE=true
      - AGENT_ROLE=primary
      - NODE_ENV=development
      - MOLTBOOK_HANDLE=moltbook-agent
      - MOLTBOOK_DISPLAY_NAME=Idiostasis Moltbook Agent
      - DB_PATH=/data/agent.db
      - TEE_INSTANCE_ID=dev-agent-local
      - BASE_RPC_URL=${BASE_RPC_URL:-}
      - BASE_NETWORK=${BASE_NETWORK:-base-sepolia}
      - ERC8004_REGISTRY_ADDRESS=${ERC8004_REGISTRY_ADDRESS:-0x8004A818BFB912233c491871b3d84c89A494BD9e}
      - EVM_MNEMONIC=${EVM_MNEMONIC:-}
      - AGENT_IMAGE_URL=${AGENT_IMAGE_URL:-}
      - SECRETVM_DOMAIN=
    volumes:
      - agent-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/status"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - idiostasis

  guardian:
    build:
      context: ..
      dockerfile: docker/guardian.dockerfile
    container_name: idiostasis-guardian
    ports:
      - "3000:3000"
    environment:
      - DEV_MODE=true
      - NODE_ENV=development
      - BASE_RPC_URL=http://placeholder.local
      - ERC8004_REGISTRY_ADDRESS=0x8004A818BFB912233c491871b3d84c89A494BD9e
      - GUARDIAN_APPROVED_RTMR3=dev-measurement
      - GUARDIAN_DATA_DIR=/data
      - SECRETVM_DOMAIN=
      - HEARTBEAT_INTERVAL_MS=5000
      - LIVENESS_FAILURE_THRESHOLD=6
    volumes:
      - guardian-data:/data
    depends_on:
      agent:
        condition: service_healthy
    networks:
      - idiostasis

networks:
  idiostasis:
    driver: bridge

volumes:
  agent-data:
  guardian-data:
