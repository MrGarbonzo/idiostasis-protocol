services:
  guardian:
    # Pin by digest — tags are forbidden because RTMR3 measures compose content.
    # Copy the digest from the GitHub Actions "Print digest" step after each build.
    image: ghcr.io/mrgarbonzo/idiostasis-protocol/guardian@REPLACE_WITH_DIGEST_FROM_GITHUB_ACTIONS
    container_name: idiostasis-guardian
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - BASE_RPC_URL=${BASE_RPC_URL}
      - ERC8004_REGISTRY_ADDRESS=${ERC8004_REGISTRY_ADDRESS}
      - GUARDIAN_APPROVED_RTMR3=${GUARDIAN_APPROVED_RTMR3}
      - GUARDIAN_DATA_DIR=/data
      - HEARTBEAT_INTERVAL_MS=${HEARTBEAT_INTERVAL_MS:-30000}
      - LIVENESS_FAILURE_THRESHOLD=${LIVENESS_FAILURE_THRESHOLD:-6}
