services:
  guardian:
    # Use the per-commit SHA tag from GitHub Actions (e.g. :sha-abc1234).
    image: ghcr.io/mrgarbonzo/idiostasis-protocol/guardian:sha-8fba734
    container_name: idiostasis-guardian
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - guardian_data:/data
    environment:
      - NODE_ENV=production
      - DEV_MODE=false
      - BASE_NETWORK=base-sepolia
      - BASE_RPC_URL=https://sepolia.base.org
      - ERC8004_REGISTRY_ADDRESS=0x8004A818BFB912233c491871b3d84c89A494BD9e
      - ERC8004_TOKEN_ID=2114
      - GUARDIAN_DATA_DIR=/data
      - HEARTBEAT_INTERVAL_MS=30000
      - LIVENESS_FAILURE_THRESHOLD=6

volumes:
  guardian_data:
    driver: local
