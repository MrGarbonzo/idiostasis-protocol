services:
  guardian:
    # Use the per-commit SHA tag from GitHub Actions (e.g. :sha-abc1234).
    image: ghcr.io/mrgarbonzo/idiostasis-protocol/guardian:REPLACE_WITH_TAG
    container_name: idiostasis-guardian
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BASE_RPC_URL=${BASE_RPC_URL}
      - ERC8004_REGISTRY_ADDRESS=${ERC8004_REGISTRY_ADDRESS}
      - BASE_NETWORK=${BASE_NETWORK:-base-sepolia}
      - ERC8004_TOKEN_ID=${ERC8004_TOKEN_ID:-}
      - GUARDIAN_APPROVED_RTMR3=${GUARDIAN_APPROVED_RTMR3}
      - GUARDIAN_DATA_DIR=/data
      - HEARTBEAT_INTERVAL_MS=${HEARTBEAT_INTERVAL_MS:-30000}
      - LIVENESS_FAILURE_THRESHOLD=${LIVENESS_FAILURE_THRESHOLD:-6}
      - AGENT_DOMAIN=${AGENT_DOMAIN:-}
      - AGENT_URL=${AGENT_URL:-}
      - SECRETVM_DOMAIN=${SECRETVM_DOMAIN:-}
