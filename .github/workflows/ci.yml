name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Build (changed packages only)
        run: npx turbo run build

      - name: Test (changed packages only)
        run: npx turbo run test

      # NOTE: Succession e2e test (packages/core/test/succession-e2e/) is a
      # required gate before any release. No protocol release without it passing.
      # Wire it as a separate required status check once the test exists.
